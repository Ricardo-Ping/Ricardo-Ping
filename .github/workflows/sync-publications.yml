name: Sync Publications

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync publications into README
        env:
          PUBLICATION_SOURCE: scholar
          GOOGLE_SCHOLAR_ID: 6dyrh68AAAAJ
          PRIMARY_AUTHOR_LAST_NAME: ping
        run: python scripts/sync_publications.py

      - name: Commit updated README/cache
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: sync publications from scholar"
          file_pattern: README.md data/publications_cache.json
